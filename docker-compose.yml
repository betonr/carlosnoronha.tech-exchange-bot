services:
  exchange-bot:
    image: betonoronha/homol:carlosnoronha.tech-exchange-bot-latest
    container_name: exchange-bot
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.prod}
    environment:
      - TZ=America/Sao_Paulo
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - webapps

networks:
  webapps:
    external: true